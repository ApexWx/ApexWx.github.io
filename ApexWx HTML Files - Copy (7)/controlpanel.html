<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Forecast Wall Control Panel</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#e6eef7;
}

header{
background:#003366;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:15px;

}

.wallbtn{

background:white;

border-radius:8px;

padding:30px 10px;

text-align:center;

font-size:18px;

font-weight:bold;

cursor:pointer;

box-shadow:0 3px 6px rgba(0,0,0,.2);

transition:all .2s;

}

.wallbtn:hover{

background:#dbe8ff;

transform:scale(1.05);

}

.wallbtn a{

text-decoration:none;

color:black;

display:block;

}

footer{

text-align:center;

margin-top:30px;

font-size:12px;

color:#555;

}

.dark{

background:#111;
color:#eee;

}

.dark .wallbtn{

background:#222;
color:#eee;

}

.dark header{

background:#000;

}

.toggle{

position:absolute;
top:15px;
right:20px;

}

button{

padding:6px 12px;

}

</style>
  </head>
  <body>
    <header>
      Forecast Wall Operations Console
      <div class="toggle">
        <button onclick="toggleDark()">Dark Mode</button>
      </div>
    </header>
    <div class="container">
      <div class="grid">
        <div class="wallbtn"><a href="opswall.html?wall=wall-a">Wall-A</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=wall-f">Wall-F</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=wall-ne">Wall-NE</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=aloft">Aloft</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=climate">Climate</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=gis">GIS</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=maps">Maps</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=marine">Marine</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=models">Models</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=nws">NWS</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=radar">Radar</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=rain">Rain</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=satellite">Satellite</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=snow">Snow</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=surface">Surface</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=temps">Temps</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=thunder">Thunder</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=tropical">Tropical</a></div>
        <div class="wallbtn"><a href="opswall.html?wall=wind">Wind</a></div>
      </div>
      <footer>
        Forecast Wall Operations Dashboard
      </footer>
    </div>
    <script>

function toggleDark(){

document.body.classList.toggle("dark");

}

</script>
  </body>
</html>
