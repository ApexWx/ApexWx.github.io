<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>North East Wall</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

/* ---------- PAGE ---------- */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url('https://github.com/ApexWx/ApexWx.github.io/blob/master/seamless-background-simply-sky.jpg?raw=true') repeat;
}

/* ---------- CONTAINER ---------- */
.container{
    max-width:1300px;
    margin:auto;
    padding:10px;
}

/* ---------- TOP BAR ---------- */
.topbar{
    position:sticky;
    top:0;
    z-index:999;
    background:rgba(255,255,255,0.85);
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    text-align:center;
    backdrop-filter:blur(6px);
}

.topbar a{
    margin:4px;
    padding:6px 10px;
    background:rgba(255,255,255,0.8);
    border-radius:6px;
    text-decoration:none;
    color:black;
    font-weight:bold;
    display:inline-block;
}

.topbar a:hover{
    text-decoration:underline;
}

/* ---------- SECTION ---------- */
.section{
    background:rgba(255,255,255,0.55);
    border-radius:8px;
    margin-bottom:12px;
    overflow:hidden;
}

.section-header{
    padding:10px;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    background:rgba(255,255,255,0.75);
}

.section-content{
    display:none;
    padding:10px;
}

/* ---------- GRID ---------- */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
    gap:10px;
}

.card{
    text-align:center;
    font-weight:bold;
}

/* ---------- IMAGES ---------- */
img{
    width:100%;
    max-width:600px;
    border-radius:6px;
    cursor:zoom-in;
    opacity:0;
    transition:opacity 0.4s ease;
}

img.loaded{
    opacity:1;
}

/* ---------- LIGHTBOX ---------- */
#lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#lightbox img{
    max-width:95%;
    max-height:95%;
}

</style>
  </head>
  <body>
    <div class="container">
      <!-- TOP NAV -->
      <div class="topbar">
        <a href="https://apexwx.github.io/">← Main Page</a>
        <a href="wall.htm">Analysis</a>
        <a href="wallf.htm">Forecast</a>
        <a href="wallnortheast.htm">NE</a>
        <a href="models.htm">Models</a>
        <a href="rad.htm">Radar</a>
        <a href="sat.htm">Satellite</a>
      </div>
      <!-- TITLE -->
      <div class="section">
        <div class="section-header">North East Wall</div>
        <div class="section-content" style="display:block;">
        </div>
      </div>
      <!-- SECTION TEMPLATE -->
      <!-- COPY THIS BLOCK TO ADD MORE -->
      <div class="section">
        <div class="section-header">Satellite</div>
        <div class="section-content">
          <div class="grid">
            <div class="card">
              Visible<br>
              <img loading="lazy" src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/ne/02/600x600.jpg">
            </div>
            <div class="card">
              GeoColor<br>
              <img loading="lazy" src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/ne/GEOCOLOR/600x600.jpg">
            </div>
            <div class="card">
              Water Vapor<br>
              <img loading="lazy" src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/ne/09/600x600.jpg">
            </div>
            <div class="card">
              Infrared<br>
              <img loading="lazy" src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/ne/Sandwich/600x600.jpg">
            </div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">Radar</div>
        <div class="section-content">
          <div class="grid">
            <div class="card">
              NE Radar<br>
              <img loading="lazy" src="http://images.intellicast.com/WxImages/RadarLoop/bgm_None_anim.gif">
            </div>
            <div class="card">
              Mid-Atlantic Radar<br>
              <img loading="lazy" src="http://images.intellicast.com/WxImages/RadarLoop/fcx_None_anim.gif">
            </div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">Surface</div>
        <div class="section-content">
          <div class="grid">
            <div class="card">
              Temperature<br>
              <img loading="lazy" src="http://coolwx.com/analysis/surface/current/temp.ne-large.png">
            </div>
            <div class="card">
              Wind<br>
              <img loading="lazy" src="http://coolwx.com/analysis/surface/current/stream.ne-large.png">
            </div>
            <div class="card">
              Dewpoint<br>
              <img loading="lazy" src="http://coolwx.com/analysis/surface/current/dewp.ne-large.png">
            </div>
            <div class="card">
              Humidity<br>
              <img loading="lazy" src="http://coolwx.com/analysis/surface/current/rh.ne-large.png">
            </div>
          </div>
        </div>
      </div>
      <!-- LIGHTBOX -->
      <div id="lightbox">
        <img id="lightbox-img">
      </div>
    </div>
    <script>

/* ---------- ACCORDION ---------- */
document.querySelectorAll(".section-header").forEach(header=>{
    header.onclick = function(){
        const content = this.nextElementSibling;
        content.style.display = content.style.display === "block" ? "none" : "block";
    }
});

/* ---------- IMAGE FADE-IN ---------- */
document.querySelectorAll("img").forEach(img=>{
    img.onload = ()=> img.classList.add("loaded");
});

/* ---------- LIGHTBOX ---------- */
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

document.querySelectorAll("img").forEach(img=>{
    img.onclick = function(){
        lightbox.style.display = "flex";
        lightboxImg.src = this.src;
    }
});

lightbox.onclick = ()=> lightbox.style.display = "none";

/* ---------- AUTO REFRESH ---------- */
setInterval(()=>{
    document.querySelectorAll("img").forEach(img=>{
        let src = img.src.split("?")[0];
        img.src = src + "?t=" + new Date().getTime();
    });
},300000);

</script>
  </body>
</html>
