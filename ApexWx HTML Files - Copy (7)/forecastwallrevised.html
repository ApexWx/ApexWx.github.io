/* ---------- IMPROVED IMAGE STYLES ---------- */
img{
    width:100%;
    height:auto;
    max-width:600px;
    border-radius:6px;
    cursor:zoom-in;
    opacity:0;
    transition:opacity 0.4s ease;
    
    /* Forces sharp edges for maps (prevents blurriness on scaling) */
    image-rendering: -webkit-optimize-contrast; 
    image-rendering: crisp-edges;               
    image-rendering: pixelated;                 
}

img.loaded{
    opacity:1;
}

/* ---------- MOBILE RESPONSIVE ---------- */
@media screen and (max-width:900px){
    td{
        display:block;
        width:100%;
        text-align:center;
    }
    img{
        max-width:100%;
    }
}

/* ---------- IMPROVED LIGHTBOX (ZOOM) ---------- */
#lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    cursor:zoom-out;
}

#lightbox img{
    /* Use Viewport units to ensure image stays within screen boundaries */
    max-width:95vw;
    max-height:95vh;
    width:auto;
    height:auto;
    border-radius:8px;
    opacity:1;
    
    /* Prevents distortion while ensuring containment */
    object-fit: contain;
    
    /* Set rendering to auto for large zoom to keep it smooth */
    image-rendering: auto;
}

      <script>
        document.addEventListener("DOMContentLoaded", function(){
            /* IMAGE AUTO REFRESH */
            function refreshImages(){
                const images = document.querySelectorAll("img:not(#lightbox img)");
                images.forEach(function(img){
                    let src = img.src.split("?")[0];
                    img.src = src + "?t=" + new Date().getTime();
                });
            }
            setInterval(refreshImages, 300000);

            /* FADE-IN ON LOAD */
            document.querySelectorAll("img").forEach(img => {
                if(img.complete) {
                    img.classList.add("loaded");
                } else {
                    img.addEventListener("load", () => {
                        img.classList.add("loaded");
                    });
                }
            });

            /* LIGHTBOX (ZOOM) */
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");

            document.querySelectorAll("img:not(#lightbox img)").forEach(img => {
                img.addEventListener("click", function(e){
                    e.stopPropagation();
                    lightbox.style.display = "flex";
                    lightboxImg.src = this.src;
                });
            });

            lightbox.addEventListener("click", function(){
                lightbox.style.display = "none";
            });
        });
      </script>
      <div id="lightbox"> <img id="lightbox-img" src=""> </div>
